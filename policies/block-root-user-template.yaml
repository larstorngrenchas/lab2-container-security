apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockrootuser
spec:
  crd:
    spec:
      names:
        kind: K8sBlockRootUser
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockrootuser

        violation[{"msg": msg}] {
          user_id := input.review.object.spec.securityContext.runAsUser
          user_id == 0
          msg := "Det är strängt förbjudet att köra som root (UID 0)!"
        }

