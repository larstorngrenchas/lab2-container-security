apiVersion: mutations.gatekeeper.sh/v1
kind: Assign
metadata:
  name: force-non-root
spec:
  applyTo:
  - groups: [""]
    kinds: ["Pod"]
    versions: ["v1"]
  match:
    scope: Namespaced
    excludedNamespaces: ["kube-system"]
  location: "spec.securityContext.runAsNonRoot"
  parameters:
    assign:
      value: true

